<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tap the Animal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <div class="celebration" id="celebration" aria-hidden="true"></div>

      <section class="topbar">
        <div>
          <p class="eyebrow">Tap the Animal</p>
          <h1 id="prompt">Find the cow</h1>
        </div>
        <button class="sound-button" id="repeatButton" type="button" aria-label="Repeat animal name">
          <span aria-hidden="true">🔊</span>
        </button>
      </section>

      <section class="stage">
        <div class="animal-grid" id="animalGrid" aria-label="Animal choices"></div>
      </section>

      <section class="feedback" id="feedback" aria-label="Game feedback">
        <div class="feedback-face" id="feedbackFace" aria-hidden="true">🙂</div>
        <p id="feedbackText">Tap the animal you hear.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
